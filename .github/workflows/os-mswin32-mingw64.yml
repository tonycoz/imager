name: os-mswin32-mingw64
on:
  workflow_call:

jobs:
  os-mswin32-mingw64:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v6
      - name: configure
        run: |
           $env:path = "c:\strawberry\c\bin;"+$env:path
           perl Makefile.PL
      - name: build
        run: |
           $env:path = "c:\strawberry\c\bin;"+$env:path
           gmake -j3
      - name: test
        run: |
           gmake test HARNESS_OPTIONS=j2
