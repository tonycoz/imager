name: os-openbsd

on:
  workflow_call:

jobs:
  os-openbsd:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: test in openbsd
        id: test
        uses: vmactions/openbsd-vm@v1
        with:
          copyback: false
          prepare: |
            /usr/sbin/pkg_add tiff png giflib jpeg git
          run: |
            echo '::group::uname -a'
            uname -a
            echo -e '::endgroup::\n::group::perl -V'
            perl -V
            echo -e '::endgroup::\n::group::Configure'
            perl Makefile.PL
            echo -e '::endgroup::\n::group::Build'
            make -j2
            echo -e '::endgroup::\n::group::Tests'
            HARNESS_OPTIONS=j2 make test
            echo '::endgroup::'
